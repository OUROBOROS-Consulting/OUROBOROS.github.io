- title: Dr Ramani
  tag: Psychology
  description: >
    The foremost public educator on narcissistic abuse. Her extensive body of work — books, lectures,
    and an indispensable YouTube channel — has given millions a vocabulary for experiences they
    couldn't previously name. An essential starting point for anyone trying to understand
    what happened to them.
  reference:
  link: "https://doctor-ramani.com"

- title: One Mom's Battle
  tag: Psychology
  description: >
    Founded by Tina Swithin, this community supports parents navigating high-conflict co-parenting
    with personality-disordered individuals. One of the few organizations that takes the intersection
    of family law and psychopathology seriously, with practical tools for navigating a system
    that was not designed with survivors in mind.
  reference:
  link: "https://www.onemomsbattle.com"
