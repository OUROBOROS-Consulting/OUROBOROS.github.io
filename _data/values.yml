- title: Integrity
  tag: Ethics
  icon: fa-solid fa-shield-halved
  description: >
    Integrity is what you do when no one is watching — and what you're willing to put on
    record when they are.
    I've worked in environments where accountability was optional and silence was rewarded.
    I chose differently. That choice cost something, and I'd make it again.
  reference:
  link: "#"

- title: Transparency
  tag: Ethics
  icon: fa-solid fa-eye
  description: >
    Opacity protects bad systems. Transparency is how individuals protect themselves —
    and how communities hold institutions accountable.
    I document carefully, communicate openly, and believe that making things legible
    is both a technical skill and a civic responsibility.
  reference:
  link: "#"

- title: Security
  tag: Technology
  icon: fa-solid fa-lock
  description: >
    Security means different things in different contexts: FedRAMP compliance, data privacy,
    personal safety. But the underlying principle is the same — people deserve to be protected,
    not just from external threats, but from systems that are supposed to help them.
  reference:
  link: "#"

- title: Kindness
  tag: Personal
  icon: fa-solid fa-hand-holding-heart
  description: >
    Kindness is not weakness — it requires discipline, especially when trust has been broken.
    In work with survivors, kindness means meeting people where they are and honoring what they've endured.
    It's the foundation that makes everything else possible.
  reference:
  link: "#"
