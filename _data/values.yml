- title: Integrity
  tag: Ethics
  icon: fa-solid fa-shield-halved
  description: >
    Integrity is what you do when no one is watching — and what you're willing to put on record when they are.
    I've worked in environments where accountability was optional and silence was rewarded.
    I've learned that the cost of compromising your principles is always higher than it appears upfront.
  reference:
  link: "#"

- title: Transparency
  tag: Ethics
  icon: fa-solid fa-eye
  description: >
    Opacity protects bad systems. Transparency is how individuals protect themselves —
    and how communities hold institutions accountable.
    I document carefully, communicate openly, and believe that making things legible
    is both a technical skill and a civic responsibility.
  reference:
  link: "#"

- title: Security
  tag: Technology
  icon: fa-solid fa-lock
  description: >
    Security means different things in different contexts — FedRAMP compliance, data privacy, personal safety —
    but the underlying principle is the same: people deserve to be protected, not just from external threats,
    but from systems that are supposed to help them.
    I take it seriously at every layer.
  reference:
  link: "#"

- title: Kindness
  tag: Personal
  icon: fa-solid fa-hand-holding-heart
  description: >
    Kindness is not weakness. It's a deliberate choice — one that requires more discipline, not less,
    especially in adversarial conditions.
    I've encountered people who mistook my patience for passivity.
    They were mistaken. Kindness is something I protect, not something I abandon when it's inconvenient.
  reference:
  link: "#"
