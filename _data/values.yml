- title: Innovation
  tag: Technology
  icon: fa-solid fa-flask
  description: >
    The best solutions aren't found in manuals — they're engineered in the gap between what exists and what's needed.
    Whether bridging service continuity during a federal system migration or prototyping a data platform under deadline,
# I've learned to treat constraints as creative prompts.
#    The question is never "can we?" but "how?"
  reference:
  link: "#"

- title: Reason
  tag: Science
  icon: fa-solid fa-scale-balanced
  description: >
    Emotions are data, but they aren't evidence. I trained in biostatistics because I believe rigorous thinking
    is one of the most compassionate things you can offer a problem — especially in public health,
    where the stakes are real people's lives.
    Clear reasoning is a form of respect.
  reference:
  link: "#"

- title: Efficiency
  tag: Technology
  icon: fa-solid fa-bolt
  description: >
    Wasted effort compounds. I automate what can be automated, document what needs to persist,
    and focus human attention where it actually matters.
    At HHS, this meant ensuring critical data pipelines kept flowing even as organizations changed hands.
    Good systems shouldn't need heroes.
  reference:
  link: "#"

- title: Autonomy
  tag: Personal
  icon: fa-solid fa-person-walking
  description: >
    I believe people have the right to make informed decisions about their own lives — including, and especially,
    when institutions make that difficult.
    Autonomy isn't just a personal value; it's a design principle.
    Systems that erode it tend to harm the people they claim to serve.
  reference:
  link: "#"

