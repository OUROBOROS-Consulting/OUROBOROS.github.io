- title: WomensLaw.org
  description: >
    The single most practical legal resource for survivors of domestic violence in the United
    States. Plain-language explanations of protective orders, custody law, immigration status,
    and court processes — organized by state, and written for people navigating the system
    alone. Their email hotline connects survivors with volunteers who can answer legal questions
    without requiring an attorney. Start here.
  link: "https://www.womenslaw.org"

- title: LawHelp.org
  description: >
    A nationwide network of free civil legal aid directories organized by state. If you need
    an attorney but cannot afford one, this is the primary gateway to legal aid organizations
    that handle domestic violence, housing, custody, immigration, and benefits cases.
    Coverage and capacity vary significantly by state, but this is the right first call.
  link: "https://www.lawhelp.org"

- title: Legal Services Corporation
  description: >
    The federally funded backbone of civil legal aid in the United States, distributing grants
    to 131 independent legal aid programs covering every state and territory. Their program
    locator connects you to the nearest office. Priority populations include survivors of
    domestic violence, individuals facing housing instability, and low-income families
    navigating custody disputes.
  link: "https://www.lsc.gov/what-legal-aid/find-legal-aid"

- title: ABA Free Legal Answers
  description: >
    A project of the American Bar Association that connects qualifying individuals with
    volunteer attorneys who answer civil legal questions online. You submit your question,
    a licensed attorney in your state responds — typically within a few days.
    Not a substitute for representation, but useful for understanding your options
    before engaging the formal legal system.
  link: "https://abalegalanswers.org"

- title: National Center for Victims of Crime
  description: >
    Provides information, resources, and referrals to services for crime victims, including
    those experiencing stalking, harassment, and intimate partner violence. Their Stalking
    Prevention, Awareness, and Resource Center (SPARC) is particularly useful for understanding
    the legal definitions and remedies available when an abuser is monitoring or following you.
  link: "https://victimsofcrime.org"

- title: VictimConnect Resource Center
  description: >
    A referral helpline for crime victims, connecting them to local, state, and national services.
    Call 1-855-4-VICTIM or chat online. Useful specifically for navigating the administrative
    and legal maze after a crime has occurred — victim compensation funds, restitution claims,
    and understanding your rights within the criminal justice process.
  link: "https://victimconnect.org"

- title: Privacy Rights Clearinghouse
  description: >
    A comprehensive, non-commercial resource on privacy law and data rights in the United States.
    Particularly useful for understanding what information about you is publicly accessible,
    how to opt out of data broker databases, and what legal protections exist against
    electronic surveillance and identity-based harassment.
  link: "https://privacyrights.org"

- title: Electronic Frontier Foundation (EFF)
  description: >
    The leading nonprofit organization defending digital rights, free speech, and privacy.
    Their Surveillance Self-Defense guide (ssd.eff.org) is the most thorough publicly available
    resource on protecting yourself from digital surveillance — written for activists and
    journalists but directly applicable to survivors of technologically-sophisticated abuse.
  link: "https://www.eff.org"

- title: National Immigrant Women's Advocacy Project
  description: >
    Focused specifically on immigrant survivors of domestic violence and trafficking, providing
    legal support, policy advocacy, and resources on VAWA self-petitions, T visas, and U visas —
    the immigration protections that exist specifically for survivors. Immigration status should
    never be a reason to remain in a dangerous situation, and these protections exist for that reason.
  link: "https://www.niwap.org"
