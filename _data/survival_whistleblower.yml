- title: Government Accountability Project
  description: >
    The oldest whistleblower protection organization in the United States, founded in 1977.
    Provides legal representation and advocacy for federal employees, government contractors,
    and corporate whistleblowers. Their legal team has handled landmark cases under the
    False Claims Act, Sarbanes-Oxley, and Dodd-Frank. If you are a public sector employee
    who witnessed wrongdoing and need to understand your options, start here.
  link: "https://whistleblower.org"

- title: National Whistleblower Center
  description: >
    A nonprofit dedicated to strengthening whistleblower rights and protections through
    litigation, legislative advocacy, and public education. Maintains one of the most
    comprehensive public libraries on whistleblower law in the United States.
    Their legal referral service connects potential whistleblowers with experienced attorneys
    who specialize in retaliation claims.
  link: "https://www.whistleblowers.org"

- title: Project On Government Oversight (POGO)
  description: >
    An independent watchdog that investigates and exposes government waste, fraud, and abuse.
    POGO provides resources for federal employees and contractors considering disclosure,
    including a detailed guide on the legal landscape for government whistleblowers.
    Also one of the more reliable organizations for understanding how the formal
    whistleblower process actually plays out in practice.
  link: "https://www.pogo.org"

- title: SEC Whistleblower Program
  description: >
    The Securities and Exchange Commission's program for reporting securities fraud, offering
    financial awards of 10–30% of sanctions exceeding $1 million, along with legal protection
    against employer retaliation. One of the strongest whistleblower programs in existence —
    over $1.3 billion in awards have been issued since its inception under Dodd-Frank.
    Submissions can be made anonymously through an attorney.
  link: "https://www.sec.gov/whistleblower"

- title: OSHA Whistleblower Protection Program
  description: >
    OSHA administers more than 20 federal whistleblower protection statutes covering industries
    from transportation to food safety to financial services. If you faced retaliation for
    reporting workplace safety violations, environmental violations, consumer fraud, or
    corporate misconduct, OSHA may have jurisdiction. Complaints must generally be filed
    within 30–180 days of the retaliatory action depending on the relevant statute.
  link: "https://www.osha.gov/whistleblower"

- title: DOJ False Claims Act Resources
  description: >
    The False Claims Act allows private citizens (called relators) to file lawsuits on behalf
    of the federal government against entities defrauding the government — and to receive
    15–30% of any recovery. The Department of Justice maintains the definitive resource on
    this statute, which has recovered over $70 billion since 1986. One of the few legal
    mechanisms that can make whistleblowing financially viable.
  link: "https://www.justice.gov/civil/false-claims-act"

- title: Taxpayers Against Fraud (TAF)
  description: >
    The nonprofit advocacy arm of the False Claims Act bar, providing education and resources
    for potential relators considering filing qui tam lawsuits. TAF also maintains a searchable
    database of past FCA settlements — useful both for understanding the landscape and for
    finding specialized attorneys who have handled cases similar to yours.
  link: "https://taf.org"

- title: Government Accountability Office
  description: >
    The independent, nonpartisan arm of Congress that audits and investigates federal programs.
    While not a direct resource for individual whistleblowers, the GAO publishes extensive
    reports on agency misconduct, program failures, and systemic vulnerabilities —
    reports that can provide critical documentary context if you are building a case involving
    federal agencies or contractors.
  link: "https://www.gao.gov"

- title: National Whistleblower Appreciation Day Coalition
  description: >
    A coalition of advocacy organizations that advances whistleblower rights through public
    education and policy reform. Maintains a current overview of pending legislation
    and recent developments in federal and state whistleblower law — useful for
    understanding the direction the legal landscape is moving before you decide how to proceed.
  link: "https://whistleblowerday.com"
