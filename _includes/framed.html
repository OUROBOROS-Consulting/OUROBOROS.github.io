<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahogany Gilded Frame</title>
  <style>
    :root {
      --gold-hi:  #e8c96a;
      --gold-mid: #b8922a;
      --gold-low: #7a5e18;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1410;
      background-image:
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px,
          transparent 1px, transparent 6px
        );
    }

    /* Outermost gold bead + drop shadow */
    .frame-rim {
      position: relative;
      padding: 5px;
      background: var(--gold-low);
      box-shadow:
        0 0 0 1px var(--gold-hi),
        10px 16px 48px rgba(0,0,0,0.75),
        3px 5px 14px rgba(0,0,0,0.5);
    }

    /* Mahogany moulding body with wood-grain texture */
    .frame-moulding {
      position: relative;
      padding: 36px;
      background:
        repeating-linear-gradient(
          175deg,
          transparent 0px, transparent 3px,
          rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
        ),
        repeating-linear-gradient(
          92deg,
          transparent 0px, transparent 18px,
          rgba(255,255,255,0.03) 18px, rgba(255,255,255,0.03) 19px
        ),
        linear-gradient(160deg,
          #b85840 0%,
          #8b3a2a 20%,
          #6b2a1a 40%,
          #7a3225 55%,
          #5c2218 70%,
          #8b3a2a 85%,
          #a04830 100%
        );
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        inset 2px 2px 6px rgba(255,255,255,0.06),
        inset -2px -2px 6px rgba(0,0,0,0.4);
    }

    /* Gilded routed channel */
    .frame-moulding::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 5px solid transparent;
      border-image: repeating-linear-gradient(
        90deg,
        var(--gold-hi)   0px,  var(--gold-hi)   3px,
        var(--gold-mid)  3px,  var(--gold-mid)   6px,
        var(--gold-low)  6px,  var(--gold-low)   8px,
        var(--gold-mid)  8px,  var(--gold-mid)  10px,
        var(--gold-hi)  10px,  var(--gold-hi)  13px
      ) 5;
      pointer-events: none;
    }

    /* Inner gold lip at the sight edge */
    .frame-moulding::after {
      content: '';
      position: absolute;
      inset: 24px;
      border: 3px solid var(--gold-mid);
      box-shadow:
        inset 0 0 0 1px var(--gold-hi),
        0 0 0 1px var(--gold-low);
      pointer-events: none;
    }

    /* Dark concave liner between moulding and canvas */
    .frame-liner {
      position: relative;
      padding: 10px;
      background: linear-gradient(135deg, #1a0a06 0%, #2e1008 50%, #1a0a06 100%);
      box-shadow:
        inset 0 0 12px rgba(0,0,0,0.9),
        inset 0 2px 4px rgba(0,0,0,0.7);
    }

    /*
      Canvas — drop your image inside this div.
      Adjust width / height to match your image's aspect ratio.
    */
    .frame-canvas {
      width: 360px;
      height: 260px;
      overflow: hidden;
      background: #111;
    }

    .frame-canvas img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Corner ornaments */
    .corner {
      position: absolute;
      width: 64px;
      height: 64px;
      z-index: 3;
      pointer-events: none;
    }
    .corner.tl { top: -1px;    left: -1px;   }
    .corner.tr { top: -1px;    right: -1px;  transform: scaleX(-1); }
    .corner.bl { bottom: -1px; left: -1px;   transform: scaleY(-1); }
    .corner.br { bottom: -1px; right: -1px;  transform: scale(-1, -1); }

    /* Side medallions */
    .side-accent {
      position: absolute;
      width: 28px;
      height: 28px;
      z-index: 3;
      pointer-events: none;
    }
    .side-accent.top    { top: 13px;    left: 50%; transform: translateX(-50%); }
    .side-accent.bottom { bottom: 13px; left: 50%; transform: translateX(-50%) scaleY(-1); }
    .side-accent.left   { left: 13px;   top: 50%;  transform: translateY(-50%) rotate(-90deg); }
    .side-accent.right  { right: 13px;  top: 50%;  transform: translateY(-50%) rotate(90deg); }
  </style>
