<nav>
  <a class="nav-logo" href="{{ '/' | relative_url }}">OUROBOROS Consulting</a>

  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="nav-links">

    {% for item in site.data.nav %}
    <div class="nav-dropdown">
      <div class="card--formula">
        <div class="card--formula__interior">
          <button class="nav-dropdown-toggle">{{ item.title }}</button>
        </div>
      </div>
      <div class="nav-dropdown-menu">
        {% for child in item.children %}
        <div class="card--formula">
          <div class="card--formula__interior">
            <a href="{{ child.url | relative_url }}">{{ child.title }}</a>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    {% endfor %}

    <!-- Contact — same wrapper, no dropdown menu -->
    <div class="nav-dropdown">
      <div class="card--formula">
        <div class="card--formula__interior">
          <a href="{{ '/intake' | relative_url }}">Contact</a>
        </div>
      </div>
    </div>

  </div>
</nav>
