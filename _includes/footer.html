<div class="echo-divider echo-divider--footer" aria-hidden="true">
  <svg class="echo-divider__fill" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="none">
    <defs>
      <pattern id="echo-chevron-footer" x="0" y="0" width="40" height="16" patternUnits="userSpaceOnUse">
        <polyline points="0,8 10,0 20,8 30,0 40,8" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>
        <polyline points="0,8 10,16 20,8 30,16 40,8" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>
        <polyline points="0,8 10,3 20,8 30,3 40,8" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.28" fill="none"/>
        <polyline points="0,8 10,13 20,8 30,13 40,8" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.28" fill="none"/>
        <polyline points="0,8 10,6 20,8 30,6 40,8" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.15" fill="none"/>
        <polyline points="0,8 10,10 20,8 30,10 40,8" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.15" fill="none"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="#1a1407"/>
    <rect width="100%" height="100%" fill="url(#echo-chevron-footer)"/>
  </svg>
</div>

<footer>
  <p class="footer-copy">
    &copy; {{ 'now' | date: "%Y" }} {{ site.author }}. All rights reserved.
  </p>
  <p class="footer-copy">
    I collaborated with Claude (Sonnet 4.6) to learn basic HTML and CSS. The rest is all me.
  </p>
  <div class="footer-links">
    <a href="{{ site.github_url }}" target="_blank">GitHub</a>
    <a href="{{ site.linkedin_url }}" target="_blank">LinkedIn</a>
    <a href="{{ site.tutoring_url }}" target="_blank">Tutoring</a>
    <a href="{{ site.email | prepend: 'mailto:' }}">Contact</a>
  </div>
</footer>
