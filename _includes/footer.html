<div class="echo-divider echo-divider--footer" aria-hidden="true">
  <svg class="echo-divider__fill" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="none">
    <defs>
      <pattern id="trellis-footer" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
        <line x1="0" y1="0" x2="24" y2="24" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.45"/>
        <line x1="24" y1="0" x2="0" y2="24" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.45"/>
        <circle cx="0"  cy="0"  r="2" fill="#c9a84c" fill-opacity="0.55"/>
        <circle cx="24" cy="0"  r="2" fill="#c9a84c" fill-opacity="0.55"/>
        <circle cx="0"  cy="24" r="2" fill="#c9a84c" fill-opacity="0.55"/>
        <circle cx="24" cy="24" r="2" fill="#c9a84c" fill-opacity="0.55"/>
        <circle cx="12" cy="12" r="2" fill="#c9a84c" fill-opacity="0.55"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="#1a1407"/>
    <rect width="100%" height="100%" fill="url(#trellis-footer)"/>
  </svg>
</div>

<footer>
  <p class="footer-copy">
    &copy; {{ 'now' | date: "%Y" }} {{ site.author }}. All rights reserved.
  </p>
  <p class="footer-copy">
    I collaborated with Claude (Sonnet 4.6) to learn basic HTML and CSS. The rest is all me.
  </p>
  <div class="footer-links">
    <a href="{{ site.github_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
    <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <a href="{{ site.tutoring_url }}" target="_blank" rel="noopener noreferrer">Tutoring</a>
    <a href="{{ site.email | prepend: 'mailto:' }}">Contact</a>
  </div>
</footer>
